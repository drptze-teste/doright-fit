      <stop offset="0%" style="stop-color:#7aaeff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f8ef7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- DO -->
  <text x="0" y="58" 
    font-family="'Helvetica Neue', Arial, sans-serif" 
